services:
  mysql:
    image: mysql:8.0
    container_name: coach-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: coach
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: .
    container_name: coach-backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"

volumes:
  mysql-data: